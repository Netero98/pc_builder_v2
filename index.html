<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CPU ↔ GPU Compatibility</title>
  <link rel="stylesheet" href="styles.css?v=14" />
</head>
<body>
  <header class="page-header">
    <h1>Совместимость процессоров и видеокарт</h1>
    <p class="subtitle">Бенчмарки PassMark: CPU Single Thread / GPU G3D Mark. Списки отсортированы по убыванию производительности.</p>
    <div class="filters">
      <label class="filter">
        <input type="checkbox" id="filter-cpu">
        <span>Только лучшие процессоры</span>
      </label>
      <label class="filter">
        <input type="checkbox" id="filter-gpu">
        <span>Только лучшие видеокарты</span>
      </label>
    </div>
  </header>

  <main class="board" id="board">
    <section class="column" data-side="cpu" id="cpu-column">
      <h2 class="column-title">Процессоры</h2>
      <ol class="track" id="cpu-track" aria-label="Список процессоров"></ol>
    </section>

    <section class="column" data-side="gpu" id="gpu-column">
      <h2 class="column-title">Видеокарты</h2>
      <ol class="track" id="gpu-track" aria-label="Список видеокарт"></ol>
    </section>
  </main>

  <script src="data.js?v=14"></script>
  <script src="app.js?v=14"></script>
</body>
</html>
